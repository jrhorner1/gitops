apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: core-infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/core
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  validation: none
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: primary-infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: core-infrastructure
  path: ./infrastructure/primary
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  validation: none
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: auxiliary-infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: core-infrastructure
  path: ./infrastructure/auxiliary
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  validation: none
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: observability-infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: primary-infrastructure
  path: ./infrastructure/observability
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  validation: none
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg