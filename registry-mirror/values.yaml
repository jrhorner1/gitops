# Default values
# https://github.com/twuni/docker-registry.helm/blob/main/values.yaml

image:
  imagePullSecrets:
    - name: regcred
ingress:
  enabled: true
  path: /
  hosts:
    - registry-mirror.jrhorner.com
  annotations: 
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: route53-issuer
    backup.velero.io/backup-volumes: data
  tls: 
    - secretName: registry-mirror-tls
      hosts:
        - registry-mirror.jrhorner.com
persistence:
  accessMode: 'ReadWriteOnce'
  enabled: true
  size: 10Gi
  storageClass: 'openebs-jiva-default'
configData:
  version: 0.1
  log:
    fields:
      service: registry
  storage:
    cache:
      blobdescriptor: inmemory
    filesystem:
      rootdirectory: /var/lib/registry
    delete:
      enabled: true
  http:
    addr: :5000
    headers:
      X-Content-Type-Options: [nosniff]
    host: http://registry-mirror.jrhorner.com
  health:
    storagedriver:
      enabled: true
      interval: 10s
      threshold: 3
proxy:
  enabled: true