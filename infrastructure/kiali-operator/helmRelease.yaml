---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kiali-operator
  namespace: kiali-operator
spec:
  releaseName: kiali-operator
  chart:
    spec:
      chart: kiali-operator
      version: 1.38.0
      sourceRef:
        kind: HelmRepository
        name: kiali
        namespace: flux-system
  interval: 5m
  install:
    remediation:
      retries: 3
  # Default values
  # https://github.com/kiali/helm-charts/blob/master/kiali-operator/values.yaml
  values:
    # Upstream: https://github.com/kiali/helm-charts/blob/master/kiali-operator/templates/deployment.yaml Line: 42
    #   image: "{{ .Values.image.repo }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ end }}:{{ .Values.image.tag }}"
    # should be:
    #   image: "{{ .Values.image.repo }}:{{ .Values.image.tag }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ end }}"
    # or:
    #   image: "{{ .Values.image.repo }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}"
    #image:
      #repo: quay.io/kiali/kiali-operator
      #tag: 1.40.1@sha256:356f18f3a935b2f226093720b65383048249413ed99da72c87d5be58cc46661c
      #digest: sha256:356f18f3a935b2f226093720b65383048249413ed99da72c87d5be58cc46661c
    cr:
      create: true
      namespace: istio-system
