apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: istio-operator
  namespace: flux-system
spec:
  interval: 15m
  dependsOn:
    - name: istio-operator-crds
  path: ./manifests/charts/istio-operator/files
  prune: false
  sourceRef:
    kind: GitRepository
    name: kube-prometheus
  patchesStrategicMerge:
    - apiVersion: apps/v1
      kind: Deployment
      metadata:
        namespace: istio-operator
        name: istio-operator
      spec:
        template:
          spec:
            containers:
              - name: istio-operator
                image: docker.io/querycapistio/operator:1.11.3 