apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: istio-operator
  namespace: flux-system
spec:
  interval: 15m
  dependsOn:
    - name: istio-operator-crds
  path: ./manifests/charts/istio-operator/files
  prune: false
  sourceRef:
    kind: GitRepository
    name: kube-prometheus
    images: 
      - name: istio-operator
        newname: docker.io/querycapistio/operator
        newtag: 1.11.3 