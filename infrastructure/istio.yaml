---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: istio-operator-crds
  namespace: flux-system
spec:
  interval: 15m
  dependsOn:
    - name: metallb-config
  path: ./manifests/charts/base/crds
  prune: false
  sourceRef:
    kind: GitRepository
    name: istio
  healthChecks:
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: istiooperators.install.istio.io
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: istio-operator
  namespace: flux-system
spec:
  interval: 15m
  dependsOn:
    - name: istio-operator-crds
  path: ./manifests/charts/istio-operator/files
  prune: false
  sourceRef:
    kind: GitRepository
    name: istio
  images:
    - name: gcr.io/istio-testing/operator
      newName: docker.io/querycapistio/operator
      newTag: 1.13.2
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: istio-system
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: istio-operator
  path: ./infrastructure/istio
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  validation: none
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
