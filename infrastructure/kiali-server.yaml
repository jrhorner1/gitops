---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: kiali-server
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
    - name: istio-system
  path: ./infrastructure/kiali-server
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  validation: none
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
