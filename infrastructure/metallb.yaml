---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: metallb
  namespace: flux-system
spec:
  interval: 15m
  prune: false
  sourceRef:
    kind: GitRepository
    name: metallb
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system
spec:
  interval: 15m
  dependsOn:
    - name: metallb
  path: ./infrastructure/metallb
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
