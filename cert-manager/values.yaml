# Default values
# https://github.com/jetstack/cert-manager/blob/master/deploy/charts/cert-manager/values.yaml

installCRDs: false
volumes:
  - name: route53-credentials
    secret:
      defaultMode: 420
      secretName: prod-route53-credentials
volumeMounts:
  - name: route53-credentials
    mountPath: /.aws
    readOnly: true
