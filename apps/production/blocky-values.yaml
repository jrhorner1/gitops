---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: blocky
  namespace: blocky
spec:
  releaseName: blocky
  chart:
    spec:
      version: "9.0.3"
  values:
    image:
      tag: v0.14
    env: {
      TZ: "America/New_York"
    }
    replicas: 3
    config: |
      upstream:
        externalResolvers:
          - tcp-tls:1.1.1.1
          - tcp-tls:1.0.0.1
          - https://cloudflare-dns.com/dns-query
          - tcp-tls:9.9.9.9
          - tcp-tls:149.112.112.112
          - https://dns.quad9.net/dns-query
      # optional: custom IP address for domain name (with all sub-domains)
      # example: query "printer.lan" or "my.printer.lan" will return 192.168.178.3
      # customDNS:
      #   mapping:
      #     printer.lan: 192.168.178.3
      # optional: definition, which DNS resolver(s) should be used for queries to the domain (with all sub-domains). Multiple resolvers must be separated by comma
      # Example: Query client.fritz.box will ask DNS server 192.168.178.1. This is necessary for local network, to resolve clients by host name
      # conditional:
      #   mapping:
      #     fritz.box: udp:192.168.178.1
      #     lan.net: udp:192.168.178.1,udp:192.168.178.2
      # optional: use black and white lists to block queries (for example ads, trackers, adult pages etc.)
      blocking:
        # definition of blacklist groups. Can be external link (http/https) or local file
        blackLists:
          ads:
            - https://s3.amazonaws.com/lists.disconnect.me/simple_ad.txt
            - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
            - https://mirror1.malwaredomains.com/files/justdomains
            - http://sysctl.org/cameleon/hosts
            - https://zeustracker.abuse.ch/blocklist.php?download=domainblocklist
            - https://s3.amazonaws.com/lists.disconnect.me/simple_tracking.txt
          special:
            - https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews/hosts
        # definition of whitelist groups. Attention: if the same group has black and whitelists, whitelists will be used to disable particular blacklist entries. If a group has only whitelist entries -> this means only domains from this list are allowed, all other domains will be blocked
        whiteLists:
          ads:
            - whitelist.txt
        # definition: which groups should be applied for which client
        clientGroupsBlock:
        #   # default will be used, if no special definition for a client name exists
          default:
            - ads
            - special
        #   # use client name (with wildcard support: * - sequence of any characters, [0-9] - range)
        #   # or single ip address / client subnet as CIDR notation
        #   laptop*:
        #     - ads
        #   192.168.178.1/24:
        #     - special
      httpPort: 4000
      bootstrapDns: tcp:1.1.1.1
      logLevel: info
      logFormat: text
    probes:
      liveness:
        failureThreshold: 5
        periodSeconds: 10
      readiness:
        failureThreshold: 5
        periodSeconds: 10
      startup:
        initialDelaySeconds: 5
        failureThreshold: 30
        periodSeconds: 10
    service:
      port:
        port: 4000
      additionalServices:
      - enabled: true
        nameSuffix: tcp-dns
        type: LoadBalancer
        externalIPs:
          - "192.168.11.53"
        port:
          port: 53
          name: dns-tcp
          protocol: TCP
          targetPort: 53
        externalTrafficPolicy: Local
        annotations:
          metallb.universe.tf/allow-shared-ip: blocky
      - enabled: true
        nameSuffix: udp-dns
        type: LoadBalancer
        externalIPs:
          - "192.168.11.53"
        port:
          port: 53
          name: dns-udp
          protocol: UDP
          targetPort: 53
        externalTrafficPolicy: Local
        annotations:
          metallb.universe.tf/allow-shared-ip: blocky