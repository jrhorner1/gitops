apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: influxdb
  namespace: observability
spec:
  chart:
    spec:
      version: "1.1.0"
  values:
    image: 
      tag: 2.2.0

    adminUser:
      organization: "homelab"
      bucket: "default"
      user: "admin"
      retention_policy: "0s"
      existingSecret: influxdb-auth

    persistence:
      size: 10Gi

    ingress:
      enabled: true
      className: nginx
      tls: true
      hostname: influxdb.jrhorner.com
      annotations: {}
        kubernetes.io/ingress.class: "nginx"
        kubernetes.io/tls-acme: "true"
      path: /